<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teresa Notas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Edit Modal -->
    <div class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-label">Editar nota</span>
                <span class="modal-close-button"><i class="fas fa-times"></i></span>
            </div>
            <input class="modal-title" placeholder="Título" type="text">
            <textarea class="modal-text" placeholder="Toma tu nota..."></textarea>
            <input class="modal-date" type="date">
        </div>
    </div>

    <header>
        <div class="header-inner">
            <div class="header-brand">
                <i class="fas fa-feather-alt header-icon"></i>
                <h1 class="header-title">Teresa<span>Notas</span></h1>
            </div>
        </div>
    </header>

    <main>

        <div id="form-container">
            <form id="form" autocomplete="off">
                <input id="note-title" placeholder="Título" type="text">
                <input id="note-text" placeholder="Toma una nota..." type="text">
                <input id="note-date" type="date">
                <div id="form-buttons">
                    <button type="button" id="form-close-button">Cancelar</button>
                    <button type="submit" id="submit-button">Guardar</button>
                </div>
            </form>
        </div>

        <div id="notes"></div>

        <div id="placeholder">
            <i class="fas fa-sticky-note placeholder-icon"></i>
            <p id="placeholder-text">Las notas que añades aparecen aquí</p>
        </div>

        <div id="color-tooltip">
            <div class="color-option" data-color="#de7136" id="LateSundown"></div>
            <div class="color-option" data-color="#6eb269" id="FreshParsley"></div>
            <div class="color-option" data-color="#3baad7" id="AfternoonSky"></div>
            <div class="color-option" data-color="#de8e83" id="BulgarianRose"></div>
            <div class="color-option" data-color="#d59200" id="SofiaSundown"></div>
        </div>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
